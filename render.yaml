services:
  - type: web
    name: sigepro-backend
    runtime: java
    rootDir: sigepro-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/sigepro-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: JWT_SECRET
        value: SIGEPRO_SECRET_KEY_2026_TRANSANDINA_RENDER_PROD
      - key: JWT_EXPIRATION
        value: 86400000
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: sigepro-db
          property: connectionString

databases:
  - name: sigepro-db
    plan: free
    databaseName: sigepro
    user: sigepro_user
